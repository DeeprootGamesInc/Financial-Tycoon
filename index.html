<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financial Tycoon</title>
    <!-- Додано іконку -->
    <link rel="icon" type="image/x-icon" href="logo.ico">
    <link rel="apple-touch-icon" href="logo.ico">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #F8FAFC;
            color: #1e293b;
            overscroll-behavior-y: none;
            transition: background-color 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        
        /* THEMES */
        body.vip-mode { background-color: #fffbeb; }
        body.vip-mode header { background: linear-gradient(135deg, #fcd34d, #f59e0b); border-bottom: 2px solid #d97706; }
        body.vip-mode header * { color: #78350f !important; }
        body.vip-mode nav { border-color: #f59e0b; background-color: #fffbeb; }
        body.vip-mode .soft-panel { border-color: #fde68a; box-shadow: 0 10px 40px -10px rgba(245, 158, 11, 0.15); }
        
        body.president-mode { background-color: #f0fdf4; }
        body.president-mode header { background: linear-gradient(135deg, #10b981, #059669); border-bottom: 2px solid #047857; }
        body.president-mode header * { color: #ffffff !important; }
        body.president-mode nav { border-color: #059669; background-color: #f0fdf4; }
        body.president-mode .soft-panel { border-color: #a7f3d0; box-shadow: 0 10px 40px -10px rgba(16, 185, 129, 0.15); }

        body.crisis-mode header { background: linear-gradient(135deg, #ef4444, #991b1b); border-bottom: 2px solid #7f1d1d; }
        body.crisis-mode header * { color: #ffffff !important; }

        @keyframes float-up { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-50px) scale(1.3); opacity: 0; } }
        .animate-float-up { animation: float-up 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        
        @keyframes slide-down { 0% { transform: translateY(-100%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        .animate-slide-down { animation: slide-down 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes pulse-fast { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.05); } }
        .animate-pulse-fast { animation: pulse-fast 0.8s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

        @keyframes ach-pop { 0% { transform: scale(0.8) translateY(20px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
        .animate-ach-pop { animation: ach-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        .soft-panel {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.04);
            border: 1px solid rgba(226, 232, 240, 0.6);
            transition: all 0.2s ease;
        }

        .btn-dynamic { transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s; }
        .btn-dynamic:active:not(:disabled) { transform: scale(0.92); }

        /* 3D Card Effect */
        #clicker-card-container { perspective: 1000px; }
        #clicker-card { transform-style: preserve-3d; transition: transform 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94); will-change: transform; }
        .card-glare {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 60%);
            opacity: 0; pointer-events: none; transition: opacity 0.2s; mix-blend-mode: overlay;
        }

        /* Navigation Scroll Hint */
        #nav-scroll-hint {
            background: linear-gradient(270deg, rgba(248,250,252,1) 30%, rgba(248,250,252,0) 100%);
            pointer-events: none; transition: opacity 0.3s ease;
        }
        .bounce-horizontal { animation: bounce-x 1.5s infinite; }
        @keyframes bounce-x { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-5px); } }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.3); border-radius: 10px; }

        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .whitespace-nowrap { white-space: nowrap; }

        /* Preloader */
        #preloader { transition: opacity 0.8s ease-in-out, visibility 0.8s; }
        .preloader-step { transition: opacity 0.8s ease-in-out, transform 0.8s cubic-bezier(0.25, 1, 0.5, 1); }
        
        /* Graphs */
        .sparkline { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: drawLine 1s ease-out forwards; }
        @keyframes drawLine { to { stroke-dashoffset: 0; } }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden relative" oncontextmenu="return false;">

    <!-- Modern Light Preloader -->
    <div id="preloader" class="fixed inset-0 z-[100] bg-slate-50 flex flex-col items-center justify-center">
        <!-- Step 1 -->
        <div id="preloader-step1" class="preloader-step absolute inset-0 flex flex-col items-center justify-center opacity-0 transform translate-y-4">
            <h2 class="text-xl font-mono tracking-[0.3em] text-slate-400 font-bold uppercase">Deeproot Games</h2>
            <p class="text-[10px] tracking-[0.5em] mt-3 text-slate-300 uppercase">Presents</p>
        </div>
        <!-- Step 2 -->
        <div id="preloader-step2" class="preloader-step absolute inset-0 flex flex-col items-center justify-center opacity-0 transform translate-y-4">
            <div class="relative mb-6">
                <i data-lucide="gem" class="w-20 h-20 text-emerald-500 relative z-10 animate-bounce drop-shadow-[0_10px_15px_rgba(16,185,129,0.3)]"></i>
                <div class="absolute inset-0 bg-emerald-400 blur-2xl opacity-40 rounded-full animate-pulse-fast"></div>
            </div>
            <h1 class="text-4xl font-extrabold tracking-[0.1em] uppercase font-mono text-slate-800 drop-shadow-sm text-center leading-tight">Financial<br><span class="text-emerald-500">Tycoon</span></h1>
        </div>
    </div>

    <!-- PWA Banner -->
    <div id="pwa-banner" class="hidden bg-emerald-600 text-white text-xs font-bold text-center py-3 px-4 z-50 flex justify-between items-center shrink-0 shadow-md">
        <!-- Вміст банеру оновлюється динамічно -->
    </div>

    <!-- Modals & Toasts -->
    <div id="modal-container" class="fixed inset-0 z-[70] flex items-center justify-center bg-slate-900/60 backdrop-blur-md p-4 hidden">
        <div id="modal-content" class="soft-panel p-8 max-w-sm w-full text-center transition-all transform scale-95 opacity-0 duration-200 max-h-[90vh] overflow-y-auto hide-scroll border-t-4 border-slate-800 relative"></div>
    </div>
    
    <!-- Achievements Toast Container -->
    <div id="achievement-container" class="fixed top-24 left-1/2 transform -translate-x-1/2 z-[60] flex flex-col items-center pointer-events-none gap-2 w-full max-w-sm px-4"></div>

    <div id="toast-container" class="fixed top-6 left-1/2 transform -translate-x-1/2 z-40 flex flex-col items-center pointer-events-none gap-2 w-full max-w-sm px-4"></div>

    <header class="bg-white/90 backdrop-blur-md p-4 sm:p-5 z-20 border-b border-slate-100 flex flex-col gap-2 shrink-0 shadow-sm transition-colors duration-500">
        <div class="flex justify-between items-start max-w-2xl mx-auto w-full">
            <div>
                <div class="flex items-center gap-2 mb-1 flex-wrap">
                    <p class="text-slate-400 text-[10px] uppercase tracking-widest font-bold w-full sm:w-auto mb-1 sm:mb-0">Balance</p>
                    <span id="player-status" class="text-[10px] font-bold px-2 py-0.5 rounded-full text-slate-500 bg-slate-100">Broke</span>
                    <span id="prestige-badge" class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-amber-100 text-amber-600 hidden">x1</span>
                    <span id="boost-badge" class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-orange-100 text-orange-600 hidden animate-pulse"><i data-lucide="flame" class="w-3 h-3 inline"></i> x5</span>
                    <span id="dark-badge" class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-slate-800 text-green-400 hidden animate-pulse"><i data-lucide="skull" class="w-3 h-3 inline"></i> Dark</span>
                    <span id="crisis-badge" class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-red-100 text-red-700 hidden animate-pulse"><i data-lucide="trending-down" class="w-3 h-3 inline"></i> CRISIS</span>
                </div>
                <h1 id="balance-display" class="text-3xl sm:text-4xl font-extrabold text-slate-800 tracking-tight transition-colors">$0</h1>
            </div>
            <div class="text-right flex flex-col items-end">
                <div class="flex gap-2 mb-2">
                    <button id="btn-fullscreen" class="btn-dynamic text-slate-400 hover:text-slate-600 bg-slate-100 p-1.5 rounded-lg"><i data-lucide="maximize" class="w-4 h-4"></i></button>
                    <button onclick="openSettings()" class="btn-dynamic text-slate-400 hover:text-slate-600 bg-slate-100 p-1.5 rounded-lg"><i data-lucide="settings" class="w-4 h-4"></i></button>
                </div>
                <p class="text-slate-400 text-[10px] uppercase tracking-widest font-bold mb-1">Passive</p>
                <p class="text-xl sm:text-2xl font-bold text-emerald-500 leading-none">
                    +<span id="passive-display">0</span><span class="text-xs text-emerald-500/50">/s</span>
                </p>
            </div>
        </div>
    </header>

    <main id="main-content" class="flex-1 overflow-y-auto p-4 sm:p-6 pb-[180px] hide-scroll"></main>

    <div class="fixed bottom-4 left-2 right-2 max-w-3xl mx-auto z-30 pb-safe pointer-events-none">
        <div class="relative w-full rounded-3xl overflow-hidden pointer-events-auto">
            <nav id="main-nav" class="bg-white/95 backdrop-blur-xl p-2 rounded-3xl shadow-[0_20px_40px_-10px_rgba(0,0,0,0.1)] border border-white flex justify-start sm:justify-between overflow-x-auto hide-scroll transition-colors duration-500 gap-1 snap-x w-full relative z-10">
                <button data-tab="bank" class="nav-btn btn-dynamic snap-center flex flex-col items-center p-3 rounded-2xl min-w-[65px] flex-1 transition-all duration-300 text-slate-800 bg-slate-100 shrink-0">
                    <i data-lucide="credit-card" class="stroke-[2.5px]"></i><span class="text-[10px] mt-1.5 font-bold tracking-wide">Bank</span>
                </button>
                <button data-tab="business" class="nav-btn btn-dynamic snap-center flex flex-col items-center p-3 rounded-2xl min-w-[65px] flex-1 transition-all duration-300 text-slate-400 hover:text-slate-600 shrink-0">
                    <i data-lucide="briefcase"></i><span class="text-[10px] mt-1.5 font-bold tracking-wide">Biz</span>
                </button>
                <button data-tab="map" class="nav-btn btn-dynamic snap-center flex flex-col items-center p-3 rounded-2xl min-w-[65px] flex-1 transition-all duration-300 text-slate-400 hover:text-slate-600 shrink-0">
                    <i data-lucide="map"></i><span class="text-[10px] mt-1.5 font-bold tracking-wide">Map</span>
                </button>
                <button data-tab="market" class="nav-btn btn-dynamic snap-center flex flex-col items-center p-3 rounded-2xl min-w-[65px] flex-1 transition-all duration-300 text-slate-400 hover:text-slate-600 shrink-0">
                    <i data-lucide="line-chart"></i><span class="text-[10px] mt-1.5 font-bold tracking-wide">Trade</span>
                </button>
                <button data-tab="luxury" class="nav-btn btn-dynamic snap-center flex flex-col items-center p-3 rounded-2xl min-w-[65px] flex-1 transition-all duration-300 text-slate-400 hover:text-slate-600 shrink-0">
                    <i data-lucide="gem"></i><span class="text-[10px] mt-1.5 font-bold tracking-wide">Lux</span>
                </button>
                <button data-tab="gov" class="nav-btn btn-dynamic snap-center flex flex-col items-center p-3 rounded-2xl min-w-[65px] flex-1 transition-all duration-300 text-slate-400 hover:text-slate-600 shrink-0">
                    <i data-lucide="landmark"></i><span class="text-[10px] mt-1.5 font-bold tracking-wide">Power</span>
                </button>
                <button data-tab="social" class="nav-btn btn-dynamic snap-center flex flex-col items-center p-3 rounded-2xl min-w-[65px] flex-1 transition-all duration-300 text-slate-400 hover:text-slate-600 shrink-0">
                    <i data-lucide="trophy"></i><span class="text-[10px] mt-1.5 font-bold tracking-wide">Rank</span>
                </button>
                <button data-tab="dark" class="nav-btn btn-dynamic snap-center flex flex-col items-center p-3 rounded-2xl min-w-[65px] flex-1 transition-all duration-300 text-slate-400 hover:text-slate-600 shrink-0">
                    <i data-lucide="skull"></i><span class="text-[10px] mt-1.5 font-bold tracking-wide">Dark</span>
                </button>
            </nav>
            <div id="nav-scroll-hint" class="absolute right-0 top-0 bottom-0 w-20 z-20 flex items-center justify-end pr-2 sm:hidden pointer-events-none">
                <div class="bg-slate-800 text-white rounded-full p-1 shadow-lg bounce-horizontal">
                    <i data-lucide="chevron-right" class="w-4 h-4"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- PWA NATIVE INSTALL SETUP ---
        const setupPWA = () => {
            // 1. Ін'єкція Manifest (Вимога браузера для Native Install Prompt)
            const manifest = {
                "name": "Financial Tycoon",
                "short_name": "Tycoon",
                "start_url": window.location.href,
                "display": "standalone",
                "background_color": "#F8FAFC",
                "theme_color": "#10b981",
                "icons": [
                    { "src": "logo.ico", "sizes": "192x192", "type": "image/x-icon" },
                    { "src": "logo.ico", "sizes": "512x512", "type": "image/x-icon" }
                ]
            };
            const manifestString = JSON.stringify(manifest);
            const manifestUrl = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(manifestString);
            const link = document.createElement('link');
            link.rel = 'manifest';
            link.href = manifestUrl;
            document.head.appendChild(link);

            // 2. Ін'єкція Service Worker (Вимога браузера для Native Install Prompt)
            if ('serviceWorker' in navigator) {
                const swCode = `self.addEventListener('fetch', function(event) {});`;
                const swBlob = new Blob([swCode], {type: 'application/javascript'});
                const swUrl = URL.createObjectURL(swBlob);
                navigator.serviceWorker.register(swUrl).catch(err => console.log('SW Error:', err));
            }
        };
        setupPWA();

        // 3. Обробник Native Install Prompt
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); // Запобігаємо автоматичному показу
            deferredPrompt = e;
            
            const banner = document.getElementById('pwa-banner');
            banner.classList.remove('hidden');
            banner.innerHTML = `
                <span class="flex items-center gap-2"><i data-lucide="smartphone" class="w-4 h-4"></i> Install App for Best Experience</span> 
                <button id="btn-install" class="bg-white text-emerald-600 px-4 py-1.5 rounded-full font-extrabold text-[10px] uppercase shadow-md active:scale-95 transition-transform">Install</button>
            `;
            lucide.createIcons();
            
            document.getElementById('btn-install').addEventListener('click', async () => {
                banner.classList.add('hidden');
                if (deferredPrompt) {
                    deferredPrompt.prompt(); // Показуємо нативне вікно браузера
                    const { outcome } = await deferredPrompt.userChoice;
                    console.log(`User response to install prompt: ${outcome}`);
                    deferredPrompt = null;
                }
            });
        });

        window.addEventListener('appinstalled', () => {
            document.getElementById('pwa-banner').classList.add('hidden');
            showToast("App installed successfully!", "success");
        });

        // --- PRELOADER SEQUENCE ---
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            const step1 = document.getElementById('preloader-step1');
            const step2 = document.getElementById('preloader-step2');
            
            setTimeout(() => { step1.classList.remove('opacity-0', 'translate-y-4'); }, 300);
            setTimeout(() => { step1.classList.add('opacity-0', '-translate-y-4'); }, 2000);
            setTimeout(() => { step2.classList.remove('opacity-0', 'translate-y-4'); }, 2800);
            setTimeout(() => { step2.classList.add('opacity-0', '-translate-y-4'); }, 5000);
            setTimeout(() => { 
                preloader.style.opacity = '0'; 
                setTimeout(() => preloader.style.visibility = 'hidden', 800);
            }, 5500);
        });

        // --- DISABLE RIGHT CLICK ---
        document.addEventListener('contextmenu', event => event.preventDefault());

        // --- INTERACTION & FULLSCREEN LOGIC ---
        const btnFullscreen = document.getElementById('btn-fullscreen');
        
        function handleFullscreenToggle() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
                btnFullscreen.innerHTML = '<i data-lucide="minimize" class="w-4 h-4"></i>';
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                btnFullscreen.innerHTML = '<i data-lucide="maximize" class="w-4 h-4"></i>';
            }
            lucide.createIcons();
        }
        
        btnFullscreen.addEventListener('click', handleFullscreenToggle);
        
        document.addEventListener('fullscreenchange', () => {
            btnFullscreen.innerHTML = document.fullscreenElement ? '<i data-lucide="minimize" class="w-4 h-4"></i>' : '<i data-lucide="maximize" class="w-4 h-4"></i>';
            lucide.createIcons();
        });

        function handleFirstInteraction() {
            startMusic();
            if (!document.fullscreenElement && window.innerWidth <= 768 && document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(e => console.log("FS blocked initially", e));
            }
        }
        document.body.addEventListener('click', handleFirstInteraction, { once: true });

        // --- AUDIO SYSTEM ---
        const AUDIO_TRACKS = ['track1.mp3', 'track2.mp3', 'track3.mp3'];
        let currentAudio = new Audio();
        let currentTrackIndex = -1;
        let musicStarted = false;
        let isMuted = false;

        function startMusic() {
            if (musicStarted || isMuted || AUDIO_TRACKS.length === 0) return;
            musicStarted = true;
            playNextTrack();
        }

        function playNextTrack() {
            if (isMuted) return;
            let nextIndex;
            do { nextIndex = Math.floor(Math.random() * AUDIO_TRACKS.length); } while (nextIndex === currentTrackIndex && AUDIO_TRACKS.length > 1);
            currentTrackIndex = nextIndex;
            
            currentAudio.src = AUDIO_TRACKS[currentTrackIndex];
            currentAudio.volume = 0;
            currentAudio.play().then(() => {
                let vol = 0;
                const fadeInterval = setInterval(() => {
                    if (vol < 0.3) { vol += 0.05; currentAudio.volume = Math.min(vol, 0.3); } 
                    else { clearInterval(fadeInterval); }
                }, 200);
            }).catch(e => console.log("Audio play blocked.", e));
        }

        currentAudio.addEventListener('ended', playNextTrack);

        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyD-TofsreirJjVYYYoemw_zi6H1q_t3bQ8",
            authDomain: "financial-tycoon.firebaseapp.com",
            projectId: "financial-tycoon",
            storageBucket: "financial-tycoon.firebasestorage.app",
            messagingSenderId: "624430983172",
            appId: "1:624430983172:web:522a95a1e6529984d3ad51",
            measurementId: "G-04SXST3J1C"
        };

        let db, auth, userProfile = null, isFirebaseActive = false;
        let lastCloudSaveTime = 0;

        try {
            firebase.initializeApp(firebaseConfig); 
            db = firebase.firestore(); 
            auth = firebase.auth(); 
            isFirebaseActive = true;
            auth.onAuthStateChanged((user) => { 
                userProfile = user; 
                if (user) checkCloudSave();
                if(state.activeTab === 'social') renderApp(); 
            });
        } catch(e) { console.log("Firebase setup failed.", e); }

        function signInGoogle() {
            if(!isFirebaseActive) { showToast("Firebase not configured.", "error"); return; }
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(error => showToast("Sign in failed: " + error.message, "error"));
        }
        
        function signOutGoogle() { 
            if(isFirebaseActive) auth.signOut().then(() => { showToast("Logged out successfully", "success"); }); 
        }

        async function checkCloudSave() {
            if(!isFirebaseActive || !userProfile) return;
            try {
                const doc = await db.collection("saves").doc(userProfile.uid).get();
                if (doc.exists) {
                    const data = doc.data();
                    const cloudState = JSON.parse(data.state);
                    if (cloudState.balance > state.balance * 1.5 || (data.timestamp && data.timestamp.toMillis() > state.lastPlayed + 60000)) {
                        showModal('☁️ Cloud Save Found', `We found a save in the cloud with <b>${formatMoney(cloudState.balance)}</b>.<br>Do you want to restore it? Local progress will be overwritten.`, 'Yes, Restore Cloud Save', () => {
                            state = { ...state, ...cloudState, activeTab: 'bank' };
                            if(!state.stats) state.stats = { taps: 0, trades: 0, darkWebUses: 0 };
                            saveGame(); renderApp(); showToast("Cloud save restored!", "success");
                        });
                    }
                }
            } catch(e) { console.error("Cloud load failed", e); }
        }

        async function forceCloudSync() {
            if(!isFirebaseActive || !userProfile) { showToast("Sign in first!", "error"); return; }
            try {
                await db.collection("saves").doc(userProfile.uid).set({
                    state: JSON.stringify(state), timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                lastCloudSaveTime = Date.now();
                showToast("Synced to Cloud Successfully!", "success");
            } catch(e) { showToast("Cloud Sync Failed", "error"); console.error(e); }
        }

        async function updateLeaderboardScore() {
            if(!isFirebaseActive || !userProfile) return;
            try {
                await db.collection("leaderboard").doc(userProfile.uid).set({
                    name: userProfile.displayName || "Anonymous", photo: userProfile.photoURL || "",
                    netWorth: getNetWorth(), timestamp: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
            } catch(e) { console.error("Score sync failed", e); }
        }

        function triggerDeleteAccountFlow() {
            if(!isFirebaseActive || !userProfile) { showToast("You must be logged in.", "error"); return; }
            showModal('⚠️ Warning', 'Are you absolutely sure you want to delete your account?', 'Yes, Proceed', () => {
                setTimeout(() => {
                    showModal('🛑 Irreversible Action', 'This action cannot be undone. All your money, businesses, and cloud progress will be PERMANENTLY lost.', 'I Understand, Continue', () => {
                        setTimeout(() => {
                            showModal('💀 Final Confirmation', 'This is your last chance to turn back. Delete account FOREVER?', 'DELETE EVERYTHING', async () => {
                                try {
                                    document.getElementById('modal-container').classList.add('hidden');

                            }, 2000); // show slightly after preloader finishes

                            state.balance = Math.max(0, state.balance + earned);
                        }
                    }
                    applyTheme();
                } catch (e) { console.error("Load error", e); }
            }
            saveGame();
            renderApp();
            startGameLoops();

            if (!state.tutorialCompleted) {
                setTimeout(() => {
                    showModal('👋 Welcome Tycoon!', 'Welcome to Financial Tycoon. Tap the Bank Card to earn your first dollars. Once you have enough, buy your first business in the <b>Biz</b> tab.<br><br>Good luck building your empire!', 'Let\'s Go!', () => {
                        state.tutorialCompleted = true; saveGame();
                        if (!document.fullscreenElement && window.innerWidth <= 768 && document.documentElement.requestFullscreen) {
                            document.documentElement.requestFullscreen().catch(e=>console.log(e));
                        }
                    });
                }, 1500);
            }
        }

        function saveGame() { 
            state.lastPlayed = Date.now(); 
            localStorage.setItem('financialTycoon_v1', JSON.stringify(state)); 
            if(isFirebaseActive && userProfile && (Date.now() - lastCloudSaveTime > 30000)) forceCloudSync();
        }

        function applyTheme() {
            document.body.classList.remove('president-mode', 'vip-mode', 'crisis-mode');
            if (state.crisis.active) document.body.classList.add('crisis-mode');
            else if (state.campaign.isPresident) document.body.classList.add('president-mode');
            else if (state.isVIP) document.body.classList.add('vip-mode');
        }

        // --- CALCULATIONS ---
        function getMapMultiplier() { return 1 + state.mapPlots.reduce((sum, plot) => sum + (plot.level * 0.05), 0); }
        function getPolicyIncomeMultiplier() {
            return 1 + state.ownedPolicies.reduce((sum, pid) => {
                const p = CONSTANTS.POLICIES.find(x => x.id === pid);
                return p.type === 'income' ? sum + p.value : sum;
            }, 0);
        }
        function getCampaignMultiplier() { return 1 + (state.campaign.levelsOwned * 0.10); }

        function getPassiveIncome() {
            const mapMult = getMapMultiplier();
            const policyMult = getPolicyIncomeMultiplier();
            const campMult = getCampaignMultiplier();
            const presMult = state.campaign.isPresident ? 100 : 1;
            const ddosMult = state.blackMarket.ddosActiveUntil > Date.now() ? 2 : 1;
            const crisisMult = state.crisis.active ? 0.5 : 1;
            const darkMatterMult = state.research.includes('rx9') ? 2 : 1;
            const infEnergyMult = state.research.includes('rx8') ? 1.5 : 1;
            const zeroGMult = state.research.includes('rx4') ? 1.2 : 1;
            
            return state.businesses.reduce((total, bState) => {
                const bConst = CONSTANTS.BUSINESSES.find(b => b.id === bState.id);
                const empMult = 1 + (bState.employees * 0.01);
                const brokenMult = bState.broken ? 0.5 : 1;
                const upgradeMult = bState.upgraded ? 2 : 1;
                const boostMult = (state.lottery.activeBoost && Date.now() < state.lottery.activeBoost.expires) ? state.lottery.activeBoost.multiplier : 1;
                const mergeMult = bState.merged ? 10 : 1;
                
                return total + (bConst.baseIncome * bState.owned * empMult * brokenMult * upgradeMult * state.prestigeMultiplier * mapMult * policyMult * campMult * boostMult * presMult * ddosMult * crisisMult * mergeMult * darkMatterMult * infEnergyMult * zeroGMult);
            }, 0);
        }

        function getTotalSalaryPerMinute() {
            if (state.blackMarket.taxEvasionActiveUntil > Date.now() || state.research.includes('rx5')) return 0;
            const baseTax = state.research.includes('r1') ? 0.5 : 1;
            const loopTax = state.research.includes('rx1') ? 0.25 : 1;
            return state.businesses.reduce((total, bState) => {
                const bConst = CONSTANTS.BUSINESSES.find(b => b.id === bState.id);
                return total + (bState.employees * bConst.empSalary * baseTax * loopTax);
            }, 0);
        }

        function getActualClickValue() {
            const mapMult = getMapMultiplier();
            const policyMult = getPolicyIncomeMultiplier();
            const campMult = getCampaignMultiplier();
            const presMult = state.campaign.isPresident ? 100 : 1;
            const boostMult = (state.lottery.activeBoost && Date.now() < state.lottery.activeBoost.expires) ? state.lottery.activeBoost.multiplier : 1;
            const cardMulti = CARD_TIERS[state.cardTier].clickMulti;
            return state.clickValue * cardMulti * state.prestigeMultiplier * mapMult * policyMult * campMult * boostMult * presMult;
        }

        function getNetWorth() {
            let nw = state.balance;
            state.businesses.forEach(bState => { const bConst = CONSTANTS.BUSINESSES.find(b => b.id === bState.id); nw += bConst.baseCost * bState.owned; });
            state.ownedLuxury.forEach(id => { nw += CONSTANTS.LUXURY.find(l => l.id === id).cost; });
            state.market.forEach(m => { nw += (state.portfolio[m.id] || 0) * m.currentPrice; });
            return nw;
        }

        function getStatus() {
            if (state.campaign.isPresident) return { title: 'Mr. President', class: 'text-white bg-emerald-600 shadow-md shadow-emerald-600/50' };
            if (state.isVIP) return { title: 'VIP Boss', class: 'text-amber-700 bg-gradient-to-r from-amber-200 to-yellow-400 border border-amber-300 shadow-md' };
            const nw = getNetWorth();
            if (nw >= 1e15) return { title: 'Quadrillionaire', class: 'text-purple-900 bg-purple-200' };
            if (nw >= 1e12) return { title: 'Trillionaire', class: 'text-purple-600 bg-purple-100' };
            if (nw >= 1e9) return { title: 'Billionaire', class: 'text-violet-600 bg-violet-100' };
            if (nw >= 1e8) return { title: 'Oligarch', class: 'text-rose-600 bg-rose-100' };
            if (nw >= 1e7) return { title: 'Tycoon', class: 'text-amber-600 bg-amber-100' };
            if (nw >= 1e6) return { title: 'Millionaire', class: 'text-emerald-600 bg-emerald-100' };
            if (nw >= 1e5) return { title: 'Upper Class', class: 'text-blue-600 bg-blue-100' };
            if (nw >= 1e4) return { title: 'Middle Class', class: 'text-slate-600 bg-slate-100' };
            return { title: 'Broke', class: 'text-slate-500 bg-slate-100' };
        }

        function formatMoney(amount) {
            if (amount >= 1e15) return '$' + (amount / 1e15).toFixed(2) + ' Qa'; 
            if (amount >= 1e12) return '$' + (amount / 1e12).toFixed(2) + ' Tr'; 
            if (amount >= 1e9) return '$' + (amount / 1e9).toFixed(2) + ' B'; 
            if (amount >= 1e6) return '$' + (amount / 1e6).toFixed(2) + ' M'; 
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(amount);
        }

        function generateSparkline(history, isUp) {
            const max = Math.max(...history);
            const min = Math.min(...history);
            const range = max - min || 1;
            const points = history.map((val, i) => `${i * 10},${35 - ((val - min) / range) * 30}`).join(' ');
            const color = isUp ? '#10b981' : '#f43f5e';
            return `<svg viewBox="0 0 90 40" class="w-24 h-10 overflow-visible sparkline">
                <polyline points="${points}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>`;
        }

        // --- LOOPS ---
        function checkAchievements() {
            ACHIEVEMENTS_DATA.forEach(ach => {
                if (!state.achievements.includes(ach.id) && ach.req()) {
                    state.achievements.push(ach.id);
                    showAchievement(ach);
                    if(state.activeTab === 'social') renderApp();
                }
            });
        }

        function showAchievement(ach) {
            const container = document.getElementById('achievement-container');
            const el = document.createElement('div');
            el.className = `bg-white border-2 border-amber-400 p-4 rounded-2xl shadow-2xl flex items-center gap-4 animate-ach-pop w-full`;
            el.innerHTML = `
                <img src="${ach.gif}" alt="Achievement GIF" class="w-16 h-16 rounded-xl object-cover bg-slate-100" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'64\\' height=\\'64\\'><rect width=\\'64\\' height=\\'64\\' fill=\\'%23f1f5f9\\'/><text x=\\'32\\' y=\\'36\\' font-size=\\'24\\' text-anchor=\\'middle\\' fill=\\'%2394a3b8\\'>🏆</text></svg>'">
                <div>
                    <p class="text-amber-500 font-extrabold text-[10px] uppercase tracking-widest">Achievement Unlocked!</p>
                    <h4 class="font-bold text-slate-800 text-lg leading-tight">${ach.title}</h4>
                    <p class="text-xs text-slate-500 mt-1">${ach.desc}</p>
                </div>
            `;
            container.appendChild(el);
            vibro([100, 50, 100, 50, 200]);
            setTimeout(() => { 
                el.classList.add('opacity-0', 'transform', '-translate-y-4', 'transition-all', 'duration-500'); 
                setTimeout(() => el.remove(), 500); 
            }, 5000);
        }

        function marketLoop() {
            state.market.forEach(mState => {
                const mConst = CONSTANTS.MARKET.find(m => m.id === mState.id) || { basePrice: mState.basePrice || mState.currentPrice, volatility: mState.volatility || 0.15 };
                if (state.research.includes('rx6')) { // Market Rigging = never crash
                    let newPrice = mState.currentPrice * (1 + (Math.random() * mConst.volatility));
                    mState.previousPrice = mState.currentPrice; mState.currentPrice = newPrice;
                } else {
                    const crisisBias = state.crisis.active ? -0.05 : 0; 
                    const changePercent = 1 + (Math.random() * mConst.volatility * 2 - mConst.volatility) + crisisBias;
                    let newPrice = mState.currentPrice * changePercent;
                    if (newPrice < mConst.basePrice * 0.1) newPrice = mConst.basePrice * 0.1;
                    mState.previousPrice = mState.currentPrice; mState.currentPrice = newPrice;
                }
                mState.history.shift(); mState.history.push(mState.currentPrice);
            });
            if(state.activeTab === 'market') renderApp(); 
            updateHeaderNumbers(); saveGame();
            marketTimer = setTimeout(marketLoop, state.research.includes('r3') ? 1000 : 3000);
        }

        function startGameLoops() {
            setInterval(() => {
                const passive = getPassiveIncome();
                if (passive > 0) state.balance += passive;
                
                let changed = false;
                state.businesses.forEach(bState => {
                    if (bState.managerOwned) {
                        const bConst = CONSTANTS.BUSINESSES.find(b => b.id === bState.id);
                        if (bState.broken && state.balance >= bConst.repairCost) { state.balance -= bConst.repairCost; bState.broken = false; changed = true; }
                        const empCost = state.research.includes('rx3') ? 0 : bConst.empCost;
                        if (bState.autoHire && !bState.broken && state.balance >= empCost) { state.balance -= empCost; bState.employees += 1; changed = true; }
                    }
                });
                if (changed && state.activeTab === 'business') renderApp();

                if (state.deposit.amount > 0 && Date.now() >= state.deposit.unlockTime) {
                    const interest = state.research.includes('r4') ? 1.10 : 1.05;
                    const payout = state.deposit.amount * interest;
                    state.balance += payout; state.deposit.amount = 0;
                    showToast(`Deposit Matured! Received ${formatMoney(payout)}`, 'success');
                    if (state.activeTab === 'bank') renderApp();
                }
                if (state.venture && Date.now() >= state.venture.unlockTime) {
                    if (Math.random() > 0.5) {
                        const payout = state.venture.amount * 10; state.balance += payout; showToast(`Startup Unicorn! +${formatMoney(payout)}`, 'success');
                    } else { showToast(`Startup Bankrupt. Lost ${formatMoney(state.venture.amount)}`, 'error'); }
                    state.venture = null; if (state.activeTab === 'bank') renderApp();
                }

                if (state.crisis.active && Date.now() > state.crisis.endTime) {
                    state.crisis.active = false; applyTheme(); showModal('📈 CRISIS OVER', 'The economy is recovering. Passive income is back to normal.'); renderApp();
                }

                checkAchievements();
                updateHeaderNumbers(); saveGame();
                if(isFirebaseActive && userProfile && Math.random() < 0.1) updateLeaderboardScore();
            }, 1000);

            clearTimeout(marketTimer); marketLoop();

            setInterval(() => {
                const totalSalary = getTotalSalaryPerMinute();
                if (totalSalary > 0) {
                    if (state.balance >= totalSalary) state.balance -= totalSalary;
                    else state.balance = 0;
                }

                if (state.balance > 100) {
                    const breakdownChance = state.research.includes('rx2') ? 0.01 : (state.research.includes('r2') ? 0.05 : 0.20);
                    if (Math.random() < breakdownChance) {
                        const healthyBiz = state.businesses.filter(b => b.owned > 0 && !b.broken);
                        if (healthyBiz.length > 0) {
                            healthyBiz[Math.floor(Math.random() * healthyBiz.length)].broken = true;
                            if (state.activeTab === 'business') renderApp();
                        }
                    }
                    if (!state.crisis.active && !state.research.includes('rx6') && Math.random() < 0.05) {
                        state.crisis.active = true; state.crisis.endTime = Date.now() + 10 * 60 * 1000; applyTheme();
                        showModal('🚨 ECONOMIC CRISIS!', 'The market crashed! Passive income is halved for 10 minutes.'); renderApp();
                    }
                }
                saveGame();
            }, 60000);
        }

        function updateHeaderNumbers() {
            document.getElementById('balance-display').textContent = formatMoney(state.balance);
            document.getElementById('passive-display').textContent = formatMoney(getPassiveIncome());
            
            const st = getStatus();

            statusEl.textContent = st.title;

            document.getElementById('prestige-badge').classList.toggle('hidden', state.prestigeMultiplier <= 1);
            if(state.prestigeMultiplier > 1) document.getElementById('prestige-badge').textContent = `x${state.prestigeMultiplier}`;
            document.getElementById('crisis-badge').classList.toggle('hidden', !state.crisis.active);

            document.querySelectorAll('.btn-buy').forEach(btn => {

                else { btn.classList.add('opacity-50'); btn.disabled = true; }
            });

            if(state.activeTab === 'bank') {
                const depTimer = document.getElementById('deposit-timer');
                if (depTimer && state.deposit.amount > 0) {
                    const rem = Math.max(0, state.deposit.unlockTime - Date.now());
                    depTimer.textContent = rem === 0 ? "Done" : `${Math.floor(rem/60000)}m ${Math.floor((rem%60000)/1000)}s`;
                }
            }
        }

                const isOwned = state.achievements.includes(ach.id);
                html += `
                <div class="soft-panel p-3 flex flex-col items-center text-center gap-2 ${isOwned ? 'border-amber-200 bg-amber-50/50' : 'grayscale opacity-40'}">
                    <div class="w-16 h-16 rounded-xl bg-slate-100 flex items-center justify-center overflow-hidden border border-slate-200 shadow-sm">
                        ${isOwned ? `<img src="${ach.gif}" class="w-full h-full object-cover">` : `<i data-lucide="lock" class="w-6 h-6 text-slate-400"></i>`}
                    </div>
                    <div>
                        <h4 class="font-bold text-slate-800 text-xs">${ach.title}</h4>
                        <p class="text-[10px] text-slate-500 leading-tight">${ach.desc}</p>
                    </div>
                </div>`;
            });
            html += `</div>`;

            // Leaderboard Section
            html += `<h2 class="text-xl font-extrabold text-slate-800 mb-4 flex items-center gap-2 tracking-tight"><i data-lucide="trophy" class="text-blue-500"></i> Global Leaderboard</h2>`;
            if (!isFirebaseActive) {
                html += `<div class="soft-panel p-6 text-center bg-slate-50 border-dashed border-2"><i data-lucide="wifi-off" class="w-12 h-12 text-slate-300 mx-auto mb-3"></i><h3 class="font-bold text-lg mb-2">Offline / Demo Mode</h3><p class="text-sm text-slate-500 mb-4">Firebase is not configured correctly. Check your connection.</p></div>`;
            } else if (!userProfile) {
                html += `<div class="soft-panel p-8 text-center bg-gradient-to-br from-blue-50 to-white"><h3 class="font-extrabold text-2xl mb-2 text-slate-800">Join the Elite</h3><p class="text-slate-500 text-sm mb-6">Sign in to save your net worth to the cloud.</p><button onclick="signInGoogle()" class="btn-dynamic flex items-center justify-center gap-3 w-full bg-white border border-slate-200 py-3 rounded-xl font-bold text-slate-700 hover:bg-slate-50"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google">Sign In with Google</button></div>`;
            } else {
                html += `<div class="soft-panel p-5 flex items-center justify-between bg-blue-50 border-blue-100 mb-6"><div class="flex items-center gap-3"><img src="${userProfile.photoURL}" class="w-10 h-10 rounded-full border-2 border-blue-500"><div><p class="text-xs text-slate-500 font-bold uppercase">Logged in as</p><p class="font-bold text-slate-800">${userProfile.displayName}</p></div></div><button onclick="signOutGoogle()" class="btn-dynamic text-xs font-bold text-rose-500 bg-rose-50 px-3 py-1.5 rounded-lg hover:bg-rose-100">Sign Out</button></div>
                <div class="soft-panel p-5 relative min-h-[200px]" id="leaderboard-list"><div class="absolute inset-0 flex items-center justify-center"><i data-lucide="loader-2" class="w-8 h-8 text-slate-300 animate-spin"></i></div></div>`;
                if(isFirebaseActive) {
                    db.collection("leaderboard").orderBy("netWorth", "desc").limit(10).get().then(snapshot => {
                        let listHtml = `<h3 class="font-bold text-slate-800 mb-4 border-b border-slate-100 pb-2">Top 10 Tycoons</h3><div class="space-y-3">`; let rank = 1;
                        snapshot.forEach(doc => {
                            const data = doc.data(); const isMe = data.name === userProfile.displayName;
                            listHtml += `<div class="flex justify-between items-center p-3 rounded-xl ${isMe ? 'bg-amber-50 border border-amber-200' : 'bg-slate-50'}"><div class="flex items-center gap-3"><span class="font-bold text-slate-400 w-4 text-center">${rank}</span>${data.photo ? `<img src="${data.photo}" class="w-8 h-8 rounded-full">` : `<div class="w-8 h-8 rounded-full bg-slate-300"></div>`}<span class="font-bold text-slate-700">${data.name} ${isMe ? '(You)' : ''}</span></div><span class="font-mono font-bold text-emerald-600">${formatMoney(data.netWorth)}</span></div>`; rank++;
                        });
                        listHtml += `</div>`; const lbList = document.getElementById('leaderboard-list'); if(lbList) lbList.innerHTML = listHtml;
                    });
                }
            }
            html += `</div>`; container.innerHTML = html;
        }

        // --- EVENT DELEGATION ---
        document.body.addEventListener('click', (e) => {
            const target = e.target.closest('button');
            if (!target) return;
            if (!target.disabled && !target.id.includes('hack-btn') && !target.closest('#btn-fullscreen')) vibro(15);

            if (target.dataset.tab) { state.activeTab = target.dataset.tab; renderApp(); return; }

            const action = target.dataset.action;
            const id = target.dataset.id;
            const cost = parseFloat(target.dataset.cost);

            if (action === 'upgrade-card') {
                if (state.balance >= cost) { state.balance -= cost; state.cardTier += 1; vibro([100, 50, 100]); showToast('Bank Card Upgraded!', 'success'); saveGame(); renderApp(); }
            }
            else if (action === 'buy-biz') {
                if (state.balance >= cost) { state.balance -= cost; state.businesses.find(b => b.id === id).owned += 1; saveGame(); renderApp(); }
            }
            else if (action === 'hire-emp') {
                const bState = state.businesses.find(b => b.id === id);
                if (state.balance >= cost && !bState.broken) { state.balance -= cost; bState.employees += 1; saveGame(); renderApp(); }
            }
            else if (action === 'hire-manager') {
                const bState = state.businesses.find(b => b.id === id);
                if (state.balance >= cost && !bState.managerOwned) { state.balance -= cost; bState.managerOwned = true; saveGame(); renderApp(); }
            }
            else if (action === 'upgrade-biz') {
                const bState = state.businesses.find(b => b.id === id);
                if (state.balance >= cost && !bState.upgraded) { state.balance -= cost; bState.upgraded = true; saveGame(); renderApp(); }
            }
            else if (action === 'repair-biz') {
                const bState = state.businesses.find(b => b.id === id);
                if (state.balance >= cost) { state.balance -= cost; bState.broken = false; saveGame(); renderApp(); }
            }
            else if (action === 'toggle-autohire') {
                const bState = state.businesses.find(b => b.id === id); bState.autoHire = !bState.autoHire; saveGame(); renderApp();
            }
            else if (action === 'buy-upgrade') {
                if (state.balance >= cost && !state.ownedUpgrades.includes(id)) { state.balance -= cost; state.ownedUpgrades.push(id); state.clickValue += CONSTANTS.UPGRADES.find(u => u.id === id).boost; saveGame(); renderApp(); }
            }
            else if (action === 'buy-research') {
                if (state.balance >= cost && !state.research.includes(id)) { state.balance -= cost; state.research.push(id); saveGame(); renderApp(); }
            }
            else if (action === 'buy-policy') {
                if (state.balance >= cost && !state.ownedPolicies.includes(id)) { state.balance -= cost; state.ownedPolicies.push(id); saveGame(); renderApp(); }
            }
            else if (action === 'buy-plot') {
                if (state.balance >= cost) { state.balance -= cost; state.mapPlots[id].owned = true; saveGame(); renderApp(); }
            }
            else if (action === 'build-hq') {
                if (state.balance >= cost && state.mapPlots[id].owned && state.mapPlots[id].level < 5) { state.balance -= cost; state.mapPlots[id].level += 1; showToast(`HQ Upgraded!`, "success"); saveGame(); renderApp(); }
            }
            else if (action === 'trade') {
                const type = target.dataset.type; const mState = state.market.find(m => m.id === id);
                if (type === 'buy' && state.balance >= mState.currentPrice) { state.balance -= mState.currentPrice; state.portfolio[id] = (state.portfolio[id] || 0) + 1; state.stats.trades++; saveGame(); renderApp(); } 
                else if (type === 'sell' && (state.portfolio[id] || 0) >= 1) { state.balance += mState.currentPrice; state.portfolio[id] -= 1; state.stats.trades++; saveGame(); renderApp(); }
            }
            else if (action === 'deposit') {
                const amt = parseFloat(document.getElementById('deposit-amount').value);
                if (amt > 0 && amt <= state.balance) { state.balance -= amt; state.deposit = { amount: amt, unlockTime: Date.now() + 300000 }; saveGame(); renderApp(); }
            }
            else if (action === 'spin-lottery') {
                const isFree = Date.now() - state.lottery.lastFreeSpin > 86400000;
                const spinCost = Math.max(1000, getPassiveIncome() * 60 * 5);
                if (!isFree && state.balance < spinCost) return;
                
                if (!isFree) state.balance -= spinCost; else state.lottery.lastFreeSpin = Date.now();
                
                state.wheelSpinning = true; saveGame(); renderApp();
                setTimeout(() => {
                    state.wheelSpinning = false;
                    let roll = Math.random();
                    if (state.wheelSpins === 0) roll = 0.05; // First spin forced luck
                    state.wheelSpins = (state.wheelSpins || 0) + 1;

                    if (roll < 0.05) { const p = Math.max(10000, getPassiveIncome() * 3600); state.balance += p; showModal('🎉 JACKPOT!', `Won ${formatMoney(p)}`); }
                    else if (roll < 0.20) { state.lottery.activeBoost = { multiplier: 5, expires: Date.now() + 120000 }; showModal('🔥 FEVER TIME!', `x5 for 2 mins!`); }
                    else if (roll < 0.40) { const p = Math.max(2000, getPassiveIncome() * 600); state.balance += p; showModal('🎁 Winner!', `Won ${formatMoney(p)}`); }
                    else { showModal('😔 Oh...', 'You won nothing.'); }
                    saveGame(); renderApp();
                }, 1500);
            }
            else if (action === 'buy-lux') {
                if (state.balance >= cost && !state.ownedLuxury.includes(id)) { state.balance -= cost; state.ownedLuxury.push(id); saveGame(); renderApp(); }
            }
            else if (action === 'start-campaign') {
                if (state.balance >= cost) { state.balance -= cost; state.campaign.started = true; state.campaign.levelsOwned = 1; saveGame(); renderApp(); }
            }
            else if (action === 'buy-campaign') {
                const idx = parseInt(target.dataset.index);
                if (state.balance >= cost && state.campaign.levelsOwned === idx) { state.balance -= cost; state.campaign.levelsOwned += 1; saveGame(); renderApp(); }
            }
            else if (action === 'become-president') {
                state.campaign.isPresident = true; applyTheme(); showModal('🇺🇸 YOU WON THE ELECTION!', `x100 Multiplier active.`); saveGame(); renderApp();
            }
            else if (action === 'buy-dark') {
                if (state.balance < cost) return;
                state.balance -= cost;
                state.stats.darkWebUses++;
                if (!state.research.includes('rx7') && Math.random() < parseFloat(target.dataset.risk)) {
                    const fine = state.balance * 0.30; state.balance -= fine; showModal('🚨 SEC RAID! 🚨', `Seized ${formatMoney(fine)} (30% balance).`);
                } else {
                    if (target.dataset.item === 'pump') { state.market.forEach(m => { m.currentPrice *= 2; m.history.shift(); m.history.push(m.currentPrice); }); showToast('Success: Market Pumped.', 'success'); }
                    else if (target.dataset.item === 'bribe') { state.blackMarket.taxEvasionActiveUntil = Date.now() + 3600000; showToast('Tax Immunity: 1 Hour.', 'success'); }
                    else if (target.dataset.item === 'ddos') { state.blackMarket.ddosActiveUntil = Date.now() + 900000; showToast('DDoS Success: Income x2 for 15m.', 'success'); }
                }
                saveGame(); renderApp();
            }
        });

        loadGame();

    </script>
</body>
</html>
